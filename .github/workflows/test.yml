name: Test Blender Addon

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on Blender ${{ matrix.blender-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        blender-version:
          - '4.2.0'
          - '4.1.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Blender ${{ matrix.blender-version }}
        uses: actions/cache@v4
        id: cache-blender
        with:
          path: |
            blender-*
            _blender-executable-path.txt
          key: ${{ runner.os }}-blender-${{ matrix.blender-version }}

      - name: Download Blender ${{ matrix.blender-version }}
        if: steps.cache-blender.outputs.cache-hit != 'true'
        run: |
          pip install blender-downloader
          blender-downloader ${{ matrix.blender-version }} --extract --remove-compressed

      - name: Install pytest-blender
        run: pip install pytest-blender

      - name: Install addon in Blender
        run: |
          BLENDER_EXECUTABLE=$(cat _blender-executable-path.txt)
          BLENDER_VERSION_SHORT=$(echo "${{ matrix.blender-version }}" | cut -d. -f1-2)
          ADDON_DIR="$HOME/.config/blender/${BLENDER_VERSION_SHORT}/scripts/addons/talon_blender"
          mkdir -p "$ADDON_DIR"
          cp -r blender-addon/* "$ADDON_DIR/"
          echo "Addon installed to: $ADDON_DIR"
          ls -la "$ADDON_DIR"

      - name: Install test dependencies in Blender's Python
        run: |
          blender_python="$(pytest-blender --blender-executable $(cat _blender-executable-path.txt))"
          $blender_python -m ensurepip
          $blender_python -m pip install pytest

      - name: Run tests
        run: |
          BLENDER_EXECUTABLE=$(cat _blender-executable-path.txt)
          pytest blender-addon/test_addon.py \
            --blender-executable "$BLENDER_EXECUTABLE" \
            -v \
            --tb=short
